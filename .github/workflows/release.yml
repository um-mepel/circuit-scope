name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to (re)build (e.g. v0.2.2). Leave empty to use current ref."
        required: false
        default: ""

permissions:
  contents: write

jobs:
  build-tauri:
    name: Build Circuit Scope (${{ matrix.label }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - label: macos-apple-silicon
            os: macos-14
            rust-target: aarch64-apple-darwin
          - label: macos-intel
            os: macos-14
            rust-target: x86_64-apple-darwin

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Set up Rust (stable)
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust-target }}

      - name: Cache cargo registry and build
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            src-tauri
            src-tauri/verilog-core

      - name: Install npm dependencies
        run: npm ci

      - name: Build frontend (Vite)
        run: npm run build

      - name: Build Tauri bundle
        env:
          # Ensure Tauri's CLI runs non-interactively on GitHub runners.
          CI: "true"
        run: |
          npx --no-install tauri build --target ${{ matrix.rust-target }}

      - name: Build csverilog CLI
        run: |
          cargo build \
            --manifest-path src-tauri/verilog-core/Cargo.toml \
            --bin csverilog \
            --release \
            --locked \
            --target ${{ matrix.rust-target }}

      - name: Stage release assets
        id: stage
        run: |
          set -euo pipefail
          version="${GITHUB_REF_NAME#v}"
          staging="${RUNNER_TEMP}/release-${{ matrix.rust-target }}"
          mkdir -p "$staging"

          bundle_root="src-tauri/target/${{ matrix.rust-target }}/release/bundle"
          if [ ! -d "$bundle_root" ]; then
            echo "error: no Tauri bundle at $bundle_root" >&2
            ls -la "src-tauri/target/${{ matrix.rust-target }}/release" || true
            exit 1
          fi

          # DMG(s)
          while IFS= read -r -d '' dmg; do
            cp "$dmg" "$staging/"
          done < <(find "$bundle_root/dmg" -maxdepth 1 -type f -name "*.dmg" -print0)

          # App bundle as tar.gz (portable alternative to the DMG)
          if [ -d "$bundle_root/macos" ]; then
            while IFS= read -r -d '' app; do
              app_base="$(basename "$app")"
              tar -C "$bundle_root/macos" -czf "$staging/${app_base%.app}_${version}_${{ matrix.rust-target }}.app.tar.gz" "$app_base"
            done < <(find "$bundle_root/macos" -maxdepth 1 -type d -name "*.app" -print0)
          fi

          # csverilog binary
          cli="src-tauri/verilog-core/target/${{ matrix.rust-target }}/release/csverilog"
          if [ ! -x "$cli" ]; then
            cli="src-tauri/target/${{ matrix.rust-target }}/release/csverilog"
          fi
          cli_asset="csverilog-${version}-${{ matrix.rust-target }}.tar.gz"
          tar -C "$(dirname "$cli")" -czf "$staging/$cli_asset" "$(basename "$cli")"
          ( cd "$staging" && shasum -a 256 "$cli_asset" > "$cli_asset.sha256" )

          ls -la "$staging"
          echo "dir=$staging" >> "$GITHUB_OUTPUT"

      - name: Publish draft Release with assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: "Circuit Scope ${{ github.ref_name }}"
          draft: true
          prerelease: false
          body: |
            Automated build of Circuit Scope ${{ github.ref_name }}.

            macOS bundles are attached as `.dmg` (per architecture) and `.app.tar.gz`.
            The standalone `csverilog` CLI binary is also attached for each architecture.
          files: |
            ${{ steps.stage.outputs.dir }}/*
